<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Word Wheel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Helvetica, sans-serif;
            background-color: #f4f4f4;
            overflow: hidden;
        }
        
        #appContainer {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        #sidebar {
            width: 250px;
            background-color: #ffffff;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        #sidebar h2 {
            margin: 0;
            padding: 20px;
            font-size: 20px;
            color: #333333;
            border-bottom: 2px solid #f4f4f4;
            text-align: center;
        }

        #wordList {
            flex: 1;
            overflow-y: auto;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #wordList li {
            padding: 12px 20px;
            border-bottom: 1px solid #f0f0f0;
            color: #555555;
            font-size: 16px;
        }

        #mainArea {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="appContainer">
        <div id="sidebar">
            <h2>Participants</h2>
            <ul id="wordList"></ul>
        </div>
        <div id="mainArea">
            <canvas id="wheelCanvas"></canvas>
        </div>
    </div>
    
    <script>
        class ConfettiParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 4;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 15 + 5;
                
                this.vx = Math.cos(angle) * velocity;
                this.vy = Math.sin(angle) * velocity - 5;
                this.gravity = 0.3;
                this.drag = 0.95;
                
                this.angle = Math.random() * Math.PI * 2;
                this.angularVelocity = Math.random() * 0.2 - 0.1;
            }

            update() {
                this.vx *= this.drag;
                this.vy *= this.drag;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.angularVelocity;
            }

            draw(context) {
                context.save();
                context.translate(this.x, this.y);
                context.rotate(this.angle);
                context.fillStyle = this.color;
                context.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                context.restore();
            }
        }

        class ConfettiManager {
            constructor() {
                this.particles = [];
            }

            explode(x, y, count) {
                for (let i = 0; i < count; i++) {
                    this.particles.push(new ConfettiParticle(x, y));
                }
            }

            update() {
                this.particles.forEach(p => p.update());
                this.particles = this.particles.filter(p => p.y < window.innerHeight + 50);
            }

            draw(context) {
                this.particles.forEach(p => p.draw(context));
            }

            clear() {
                this.particles = [];
            }
        }

        class WheelController {
            constructor(canvasId, items) {
                this.canvas = document.getElementById(canvasId);
                this.context = this.canvas.getContext('2d');
                this.listContainer = document.getElementById('wordList');
                
                this.items = items;
                this.itemCount = this.items.length;
                
                this.currentAngle = 0;
                this.spinSpeed = 0;
                this.isSpinning = false;
                this.friction = 0.95;
                this.winner = null;
                this.acceptedWinner = null;
                
                this.confettiManager = new ConfettiManager();
                
                this.initializeEvents();
                this.renderList();
                this.resizeCanvas();
            }

            initializeEvents() {
                window.addEventListener('resize', () => this.resizeCanvas());
                
                document.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter') {
                        this.triggerSpin();
                    }
                });
            }

            resizeCanvas() {
                const container = this.canvas.parentElement;
                this.canvas.width = Math.min(container.clientWidth, 800);
                this.canvas.height = Math.min(container.clientHeight, 800);
                this.centerX = this.canvas.width / 2;
                this.centerY = this.canvas.height / 2;
                this.radius = Math.min(this.centerX, this.centerY) - 60;
                
                this.render();
            }

            renderList() {
                this.listContainer.innerHTML = '';
                this.items.forEach(item => {
                    const li = document.createElement('li');
                    li.textContent = item;
                    this.listContainer.appendChild(li);
                });
            }

            triggerSpin() {
                if (!this.isSpinning) {
                    this.confettiManager.clear();
                    
                    if (this.acceptedWinner && this.items.includes(this.acceptedWinner)) {
                        this.items = this.items.filter(item => item !== this.acceptedWinner);
                        this.itemCount = this.items.length;
                        this.renderList();
                    }
                    
                    if (this.itemCount > 0) {
                        this.isSpinning = true;
                        this.spinSpeed = Math.random() * 0.4 + 0.4;
                        this.winner = null;
                        this.acceptedWinner = null;
                        this.runEngine();
                    }
                }
            }

            updatePhysics() {
                if (this.isSpinning) {
                    this.currentAngle += this.spinSpeed;
                    this.spinSpeed *= this.friction;

                    if (this.spinSpeed < 0.002) {
                        this.spinSpeed = 0;
                        this.isSpinning = false;
                        this.determineWinner();
                    }
                }
                
                this.confettiManager.update();
            }

            determineWinner() {
                const sliceAngle = (2 * Math.PI) / this.itemCount;
                const normalizedAngle = this.currentAngle % (2 * Math.PI);
                const winningIndex = Math.floor(((2 * Math.PI) - normalizedAngle) / sliceAngle) % this.itemCount;
                
                this.winner = this.items[winningIndex];
                this.acceptedWinner = this.winner;
                
                this.confettiManager.explode(this.centerX, this.centerY, 150);
            }

            render() {
                this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (this.itemCount === 0) return;

                const sliceAngle = (2 * Math.PI) / this.itemCount;

                for (let i = 0; i < this.itemCount; i++) {
                    const startAngle = this.currentAngle + i * sliceAngle;
                    const endAngle = startAngle + sliceAngle;

                    this.context.beginPath();
                    this.context.moveTo(this.centerX, this.centerY);
                    this.context.arc(this.centerX, this.centerY, this.radius, startAngle, endAngle);
                    this.context.closePath();

                    this.context.fillStyle = i % 2 === 0 ? '#4A90E2' : '#50E3C2';
                    this.context.fill();
                    this.context.lineWidth = 3;
                    this.context.strokeStyle = '#FFFFFF';
                    this.context.stroke();

                    this.context.save();
                    this.context.translate(this.centerX, this.centerY);
                    this.context.rotate(startAngle + sliceAngle / 2);
                    this.context.textAlign = 'right';
                    this.context.textBaseline = 'middle';
                    this.context.fillStyle = '#333333';
                    this.context.font = 'bold 18px Helvetica';
                    this.context.fillText(this.items[i], this.radius - 20, 0);
                    this.context.restore();
                }

                this.context.beginPath();
                this.context.arc(this.centerX, this.centerY, 50, 0, 2 * Math.PI);
                this.context.fillStyle = '#FFFFFF';
                this.context.fill();
                this.context.lineWidth = 4;
                this.context.strokeStyle = '#333333';
                this.context.stroke();

                this.context.fillStyle = '#333333';
                this.context.font = 'bold 18px Helvetica';
                this.context.textAlign = 'center';
                this.context.textBaseline = 'middle';
                this.context.fillText('SPIN', this.centerX, this.centerY);

                const pointerX = this.centerX + this.radius + 15;
                this.context.beginPath();
                this.context.moveTo(pointerX, this.centerY);
                this.context.lineTo(pointerX + 30, this.centerY - 20);
                this.context.lineTo(pointerX + 30, this.centerY + 20);
                this.context.closePath();
                this.context.fillStyle = '#D0021B';
                this.context.fill();
                this.context.lineWidth = 3;
                this.context.strokeStyle = '#333333';
                this.context.stroke();

                this.context.fillStyle = '#333333';
                this.context.font = 'bold 24px Helvetica';
                this.context.textAlign = 'left';
                
                if (this.winner) {
                    this.context.fillText(`Winner: ${this.winner}`, 20, 40);
                } else if (this.isSpinning) {
                    this.context.fillText('Spinning...', 20, 40);
                } else {
                    this.context.fillText('Press ENTER to spin', 20, 40);
                }

                this.confettiManager.draw(this.context);
            }

            runEngine() {
                this.updatePhysics();
                this.render();
                
                if (this.isSpinning || this.confettiManager.particles.length > 0) {
                    requestAnimationFrame(() => this.runEngine());
                }
            }
        }

        window.onload = () => {
            const wheelOptions = [
                "A*",
                "Hot score",
                "La sécurité",
                "Comment j'ai optimisé le jeu",
                "Les plus grosses difficultés du développement",
                "Conformité Légale & RGPD",
                "Mon architecture SQL",
                "Signalement de la page hub automatique et manuelle",
                "L'ia",
                "Les points faibles de mon site"
            ];
            
            const app = new WheelController('wheelCanvas', wheelOptions);
        };
    </script>
</body>
</html>
