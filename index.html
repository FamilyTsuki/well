<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Word Wheel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
            overflow: hidden;
            font-family: Helvetica, sans-serif;
        }
        canvas {
            display: block;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="wheelCanvas"></canvas>
    
    <script>
        class WheelController {
            constructor(canvasId, items) {
                this.canvas = document.getElementById(canvasId);
                this.context = this.canvas.getContext('2d');
                
                this.items = items;
                this.itemCount = this.items.length;
                
                this.currentAngle = 0;
                this.spinSpeed = 0;
                this.isSpinning = false;
                this.friction = 0.985;
                this.winner = null;
                this.acceptedWinner = null;
                
                this.initializeEvents();
                this.resizeCanvas();
            }

            initializeEvents() {
                window.addEventListener('resize', () => this.resizeCanvas());
                
                this.canvas.addEventListener('click', () => {
                    this.triggerSpin();
                });
            }

            resizeCanvas() {
                this.canvas.width = Math.min(window.innerWidth, 800);
                this.canvas.height = Math.min(window.innerHeight, 800);
                this.centerX = this.canvas.width / 2;
                this.centerY = this.canvas.height / 2;
                this.radius = Math.min(this.centerX, this.centerY) - 60;
                
                this.render();
            }

            triggerSpin() {
                if (!this.isSpinning) {
                    if (this.acceptedWinner && this.items.includes(this.acceptedWinner)) {
                        this.items = this.items.filter(item => item !== this.acceptedWinner);
                        this.itemCount = this.items.length;
                    }
                    
                    if (this.itemCount > 0) {
                        this.isSpinning = true;
                        this.spinSpeed = Math.random() * 0.4 + 0.4;
                        this.winner = null;
                        this.acceptedWinner = null;
                        this.runEngine();
                    }
                }
            }

            updatePhysics() {
                if (this.isSpinning) {
                    this.currentAngle += this.spinSpeed;
                    this.spinSpeed *= this.friction;

                    if (this.spinSpeed < 0.002) {
                        this.spinSpeed = 0;
                        this.isSpinning = false;
                        this.determineWinner();
                    }
                }
            }

            determineWinner() {
                const sliceAngle = (2 * Math.PI) / this.itemCount;
                const normalizedAngle = this.currentAngle % (2 * Math.PI);
                const winningIndex = Math.floor(((2 * Math.PI) - normalizedAngle) / sliceAngle) % this.itemCount;
                
                this.winner = this.items[winningIndex];
                this.acceptedWinner = this.winner;
                this.render();
            }

            render() {
                this.context.clearRect(0, 0, this.canvas.width, this.canvas.height);
                
                if (this.itemCount === 0) return;

                const sliceAngle = (2 * Math.PI) / this.itemCount;

                for (let i = 0; i < this.itemCount; i++) {
                    const startAngle = this.currentAngle + i * sliceAngle;
                    const endAngle = startAngle + sliceAngle;

                    this.context.beginPath();
                    this.context.moveTo(this.centerX, this.centerY);
                    this.context.arc(this.centerX, this.centerY, this.radius, startAngle, endAngle);
                    this.context.closePath();

                    this.context.fillStyle = i % 2 === 0 ? '#4A90E2' : '#50E3C2';
                    this.context.fill();
                    this.context.lineWidth = 3;
                    this.context.strokeStyle = '#FFFFFF';
                    this.context.stroke();

                    this.context.save();
                    this.context.translate(this.centerX, this.centerY);
                    this.context.rotate(startAngle + sliceAngle / 2);
                    this.context.textAlign = 'right';
                    this.context.textBaseline = 'middle';
                    this.context.fillStyle = '#333333';
                    this.context.font = 'bold 18px Helvetica';
                    this.context.fillText(this.items[i], this.radius - 20, 0);
                    this.context.restore();
                }

                this.context.beginPath();
                this.context.arc(this.centerX, this.centerY, 50, 0, 2 * Math.PI);
                this.context.fillStyle = '#FFFFFF';
                this.context.fill();
                this.context.lineWidth = 4;
                this.context.strokeStyle = '#333333';
                this.context.stroke();

                this.context.fillStyle = '#333333';
                this.context.font = 'bold 18px Helvetica';
                this.context.textAlign = 'center';
                this.context.textBaseline = 'middle';
                this.context.fillText('SPIN', this.centerX, this.centerY);

                const pointerX = this.centerX + this.radius + 15;
                this.context.beginPath();
                this.context.moveTo(pointerX, this.centerY);
                this.context.lineTo(pointerX + 30, this.centerY - 20);
                this.context.lineTo(pointerX + 30, this.centerY + 20);
                this.context.closePath();
                this.context.fillStyle = '#D0021B';
                this.context.fill();
                this.context.lineWidth = 3;
                this.context.strokeStyle = '#333333';
                this.context.stroke();

                this.context.fillStyle = '#333333';
                this.context.font = 'bold 24px Helvetica';
                this.context.textAlign = 'left';
                
                if (this.winner) {
                    this.context.fillText(`Winner: ${this.winner}`, 20, 40);
                } else if (this.isSpinning) {
                    this.context.fillText('Spinning...', 20, 40);
                } else {
                    this.context.fillText('Click anywhere to spin', 20, 40);
                }
            }

            runEngine() {
                this.updatePhysics();
                this.render();
                
                if (this.isSpinning) {
                    requestAnimationFrame(() => this.runEngine());
                }
            }
        }

        window.onload = () => {
            const sampleWords = [
                "Apple", "Banana", "Cherry", "Date", "Elderberry", 
                "Fig", "Grape", "Honeydew", "Kiwi", "Lemon",
                "Mango", "Nectarine", "Orange", "Papaya", "Quince",
                "Raspberry", "Strawberry", "Tangerine", "Ugli", "Watermelon"
            ];
            
            const app = new WheelController('wheelCanvas', sampleWords);
            app.render();
        };
    </script>
</body>
</html>
